# Source: https://github.com/Beavercreek-Robotics/creekrobotics.org/blob/main/.github/workflows/preview.yml
#
# Branch Preview Deployments
# ──────────────────────────
# Triggered on pushes to any branch OTHER than `main`.
# Builds the site with a branch-specific base path and deploys
# it to a subdirectory of the `gh-pages` branch, making the
# preview available at:
#
#   https://creekrobotics.org/<sanitized-branch-name>/
#
# The workflow also posts a comment to any associated pull request
# with a direct link to the preview URL.
#
# Previews for deleted branches are cleaned up automatically
# by the "cleanup" job at the bottom of this file.
#
# NOTE: Branch names are lower-cased and non-alphanumeric characters
# (except hyphens and underscores) are replaced with hyphens to
# produce a valid URL segment.

name: Branch Preview

on:
  push:
    branches-ignore:
      - main
      - gh-pages
  # Clean up when a branch is deleted
  delete:

concurrency:
  group: pages-preview-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─── Deploy preview ───────────────────────────────────────────
  deploy-preview:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sanitize branch name
        id: branch
        run: |
          RAW="${GITHUB_REF_NAME}"
          SAFE=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_-]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"
          echo "url=https://creekrobotics.org/$SAFE/" >> "$GITHUB_OUTPUT"
          echo "Preview slug: $SAFE"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site (branch base path)
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ steps.branch.outputs.safe }}/

      - name: Deploy preview to subdirectory
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.branch.outputs.safe }}
          # keep_files ensures we don't wipe other branch previews or the CNAME
          keep_files: true
          commit_message: "preview(${{ steps.branch.outputs.safe }}): ${{ github.event.head_commit.message }}"

      - name: Find associated pull request
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
              state: 'open',
            });
            return pulls.length > 0 ? pulls[0].number : null;

      - name: Comment preview URL on pull request
        if: steps.find-pr.outputs.result != 'null'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.find-pr.outputs.result }};
            const previewUrl = '${{ steps.branch.outputs.url }}';
            const branch = '${{ steps.branch.outputs.safe }}';

            // Find existing bot comment to update rather than spam
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const marker = '<!-- preview-bot -->';
            const existing = comments.find(c => c.body.includes(marker));

            const body = `${marker}\n🚀 **Preview deployment updated!**\n\n` +
              `Branch \`${branch}\` is live at: **${previewUrl}**\n\n` +
              `_Last updated: ${new Date().toUTCString()}_`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  # ─── Clean up deleted branch preview ─────────────────────────
  cleanup-preview:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest

    steps:
      - name: Sanitize deleted branch name
        id: branch
        run: |
          RAW="${{ github.event.ref }}"
          SAFE=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_-]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview subdirectory
        run: |
          SLUG="${{ steps.branch.outputs.safe }}"
          if [ -d "$SLUG" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$SLUG"
            git commit -m "cleanup: remove preview for deleted branch $SLUG"
            git push
            echo "Removed preview: $SLUG"
          else
            echo "No preview found for: $SLUG — nothing to clean up."
          fi
