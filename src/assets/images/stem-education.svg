<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ebf8ff"/>
      <stop offset="100%" style="stop-color:#e9d8fd"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>
  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1a365d">STEM Education</text>
  <!-- Science (atom) -->
  <circle cx="100" cy="140" r="12" fill="#c53030"/>
  <ellipse cx="100" cy="140" rx="40" ry="16" fill="none" stroke="#1a365d" stroke-width="2" transform="rotate(0 100 140)"/>
  <ellipse cx="100" cy="140" rx="40" ry="16" fill="none" stroke="#c53030" stroke-width="2" transform="rotate(60 100 140)"/>
  <ellipse cx="100" cy="140" rx="40" ry="16" fill="none" stroke="#d69e2e" stroke-width="2" transform="rotate(120 100 140)"/>
  <text x="100" y="200" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a365d">Science</text>
  <!-- Technology (circuit) -->
  <rect x="220" y="110" width="120" height="70" rx="8" fill="#1a365d" opacity="0.1"/>
  <rect x="230" y="120" width="100" height="50" rx="4" fill="#1a365d" opacity="0.15"/>
  <circle cx="250" cy="145" r="6" fill="#1a365d"/>
  <circle cx="300" cy="145" r="6" fill="#c53030"/>
  <circle cx="310" cy="145" r="6" fill="#d69e2e"/>
  <line x1="256" y1="145" x2="294" y2="145" stroke="#1a365d" stroke-width="2"/>
  <line x1="250" y1="139" x2="250" y2="120" stroke="#1a365d" stroke-width="2"/>
  <line x1="300" y1="139" x2="300" y2="120" stroke="#c53030" stroke-width="2"/>
  <line x1="316" y1="145" x2="330" y2="145" stroke="#d69e2e" stroke-width="2"/>
  <line x1="250" y1="151" x2="250" y2="170" stroke="#1a365d" stroke-width="2"/>
  <line x1="270" y1="120" x2="290" y2="120" stroke="#4299e1" stroke-width="2"/>
  <text x="280" y="200" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a365d">Technology</text>
  <!-- Engineering (gear) -->
  <circle cx="440" cy="145" r="20" fill="#d69e2e"/>
  <circle cx="440" cy="145" r="10" fill="#ffffff"/>
  <rect x="436" y="118" width="8" height="12" rx="2" fill="#d69e2e"/>
  <rect x="436" y="160" width="8" height="12" rx="2" fill="#d69e2e"/>
  <rect x="413" y="141" width="12" height="8" rx="2" fill="#d69e2e"/>
  <rect x="455" y="141" width="12" height="8" rx="2" fill="#d69e2e"/>
  <rect x="420" y="124" width="8" height="12" rx="2" fill="#d69e2e" transform="rotate(45 424 130)"/>
  <rect x="452" y="124" width="8" height="12" rx="2" fill="#d69e2e" transform="rotate(-45 456 130)"/>
  <text x="440" y="200" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a365d">Engineering</text>
  <!-- Math (equations) -->
  <rect x="530" y="110" width="55" height="70" rx="8" fill="#1a365d" opacity="0.08"/>
  <text x="557" y="135" text-anchor="middle" font-family="monospace" font-size="12" fill="#1a365d">f(x)=x²</text>
  <text x="557" y="152" text-anchor="middle" font-family="monospace" font-size="12" fill="#c53030">∑n=1</text>
  <text x="557" y="169" text-anchor="middle" font-family="monospace" font-size="12" fill="#d69e2e">π≈3.14</text>
  <text x="557" y="200" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1a365d">Math</text>
  <!-- Students studying at table -->
  <!-- Table -->
  <rect x="100" y="290" width="400" height="15" rx="4" fill="#a0aec0"/>
  <rect x="130" y="305" width="10" height="50" rx="3" fill="#718096"/>
  <rect x="460" y="305" width="10" height="50" rx="3" fill="#718096"/>
  <!-- Student 1 -->
  <circle cx="180" cy="265" r="18" fill="#718096"/>
  <rect x="162" y="283" width="36" height="40" rx="6" fill="#1a365d"/>
  <circle cx="180" cy="265" r="8" fill="#f6ad55" opacity="0.8"/>
  <!-- Laptop screen -->
  <rect x="155" y="270" width="35" height="25" rx="3" fill="#4299e1" opacity="0.3"/>
  <!-- Student 2 -->
  <circle cx="300" cy="260" r="18" fill="#4a5568"/>
  <rect x="282" y="278" width="36" height="40" rx="6" fill="#c53030"/>
  <circle cx="300" cy="260" r="8" fill="#f6ad55" opacity="0.8"/>
  <!-- Book -->
  <rect x="275" y="270" width="30" height="22" rx="2" fill="#d69e2e" opacity="0.6"/>
  <!-- Student 3 -->
  <circle cx="420" cy="265" r="18" fill="#718096"/>
  <rect x="402" y="283" width="36" height="40" rx="6" fill="#1a365d"/>
  <circle cx="420" cy="265" r="8" fill="#f6ad55" opacity="0.8"/>
  <!-- Robot toy -->
  <rect x="396" y="268" width="22" height="22" rx="3" fill="#2d5a9e" opacity="0.7"/>
  <!-- Caption -->
  <text x="300" y="385" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4a5568">Empowering students through hands-on STEM education</text>
</svg>
