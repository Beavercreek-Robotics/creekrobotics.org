<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78"/>
      <stop offset="100%" style="stop-color:#276749"/>
    </linearGradient>
  </defs>
  <!-- Arena background -->
  <rect width="600" height="400" fill="#1a202c"/>
  <!-- Arena field -->
  <ellipse cx="300" cy="280" rx="260" ry="120" fill="url(#floorGrad)" opacity="0.9"/>
  <!-- Field markings -->
  <ellipse cx="300" cy="280" rx="200" ry="90" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="160" x2="300" y2="400" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  <!-- Stands/audience -->
  <rect x="0" y="0" width="600" height="160" fill="#2d3748"/>
  <rect x="0" y="155" width="600" height="20" fill="#4a5568"/>
  <!-- Audience rows -->
  <rect x="10" y="10" width="580" height="35" rx="4" fill="#1a365d" opacity="0.7"/>
  <rect x="10" y="50" width="580" height="35" rx="4" fill="#1a365d" opacity="0.5"/>
  <rect x="10" y="90" width="580" height="35" rx="4" fill="#1a365d" opacity="0.3"/>
  <!-- Audience dots -->
  <circle cx="40" cy="27" r="6" fill="#f6ad55"/>
  <circle cx="70" cy="27" r="6" fill="#fc8181"/>
  <circle cx="100" cy="27" r="6" fill="#68d391"/>
  <circle cx="130" cy="27" r="6" fill="#f6ad55"/>
  <circle cx="160" cy="27" r="6" fill="#fc8181"/>
  <circle cx="190" cy="27" r="6" fill="#f6ad55"/>
  <circle cx="220" cy="27" r="6" fill="#68d391"/>
  <circle cx="250" cy="27" r="6" fill="#fc8181"/>
  <circle cx="280" cy="27" r="6" fill="#f6ad55"/>
  <circle cx="310" cy="27" r="6" fill="#fc8181"/>
  <circle cx="340" cy="27" r="6" fill="#68d391"/>
  <circle cx="370" cy="27" r="6" fill="#f6ad55"/>
  <circle cx="400" cy="27" r="6" fill="#fc8181"/>
  <circle cx="430" cy="27" r="6" fill="#68d391"/>
  <circle cx="460" cy="27" r="6" fill="#f6ad55"/>
  <circle cx="490" cy="27" r="6" fill="#fc8181"/>
  <circle cx="520" cy="27" r="6" fill="#f6ad55"/>
  <circle cx="550" cy="27" r="6" fill="#68d391"/>
  <!-- Robot 1 - Navy (club team) -->
  <rect x="150" y="240" width="55" height="45" rx="6" fill="#1a365d"/>
  <rect x="158" y="230" width="39" height="30" rx="5" fill="#2d5a9e"/>
  <rect x="164" y="236" width="12" height="8" rx="2" fill="#d69e2e"/>
  <rect x="178" y="236" width="12" height="8" rx="2" fill="#d69e2e"/>
  <rect x="144" y="252" width="12" height="25" rx="4" fill="#c53030"/>
  <rect x="199" y="252" width="12" height="25" rx="4" fill="#c53030"/>
  <!-- Robot 1 wheels -->
  <circle cx="162" cy="288" r="7" fill="#1a202c"/>
  <circle cx="193" cy="288" r="7" fill="#1a202c"/>
  <!-- Robot 2 - Red -->
  <rect x="395" y="235" width="55" height="45" rx="6" fill="#c53030"/>
  <rect x="403" y="225" width="39" height="30" rx="5" fill="#fc8181"/>
  <rect x="409" y="231" width="12" height="8" rx="2" fill="#ffffff"/>
  <rect x="423" y="231" width="12" height="8" rx="2" fill="#ffffff"/>
  <rect x="389" y="247" width="12" height="25" rx="4" fill="#1a365d"/>
  <rect x="444" y="247" width="12" height="25" rx="4" fill="#1a365d"/>
  <!-- Robot 2 wheels -->
  <circle cx="407" cy="283" r="7" fill="#1a202c"/>
  <circle cx="438" cy="283" r="7" fill="#1a202c"/>
  <!-- Scoreboard -->
  <rect x="210" y="10" width="180" height="50" rx="6" fill="#d69e2e"/>
  <text x="300" y="30" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1a365d">BEAVERCREEK REGIONAL</text>
  <text x="260" y="48" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#c53030">142</text>
  <text x="300" y="48" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a365d">—</text>
  <text x="340" y="48" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1a365d">98</text>
  <!-- Spotlight effects -->
  <circle cx="180" cy="0" r="60" fill="#ffffff" opacity="0.03"/>
  <circle cx="420" cy="0" r="60" fill="#ffffff" opacity="0.03"/>
  <!-- Caption -->
  <text x="300" y="390" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0aec0">FRC Regional Competition — Beavercreek Robotics</text>
</svg>
